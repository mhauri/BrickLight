esphome:
  name: brick-light
  friendly_name: "BrickLight"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Logging
logger:
  level: INFO

# Home Assistant API
api:
  encryption:
    key: !secret device_api_key
# OTA Updates
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback Hotspot wenn WiFi nicht verfügbar
  ap:
    ssid: "BrickLight"
    password: !secret fallback_password

# Captive Portal (für Fallback Hotspot)
captive_portal:

# I2C Bus
i2c:
  sda: GPIO32
  scl: GPIO33
  scan: true
  frequency: 400kHz

# PCA9685
pca9685:
  - id: pca9685_hub
    address: 0x40
    frequency: 1000

# 16 Outputs
output:
  - platform: pca9685
    pca9685_id: pca9685_hub
    channel: 0
    id: led_kanal_0

  - platform: pca9685
    pca9685_id: pca9685_hub
    channel: 1
    id: led_kanal_1

  - platform: pca9685
